name: Cleanup Old Artifacts

on:
  workflow_dispatch: # Manual trigger dari GitHub UI
  schedule:
    - cron: '0 0 * * 0' # Setiap Minggu jam 00:00 UTC

jobs:
  cleanup:
    name: Delete All Artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete all artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Fetching artifacts for ${owner}/${repo}...`);

            let page = 1;
            let deleted = 0;

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              if (data.artifacts.length === 0) break;

              for (const artifact of data.artifacts) {
                console.log(`Deleting: ${artifact.name} (${artifact.id}) - ${artifact.size_in_bytes} bytes`);
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                deleted++;
              }

              page++;
            }

            console.log(`Done! Deleted ${deleted} artifacts.`);
