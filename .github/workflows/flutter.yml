name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis + unit/integration tests.
  # Reports red X on failure but does NOT gate the APK build below — that way
  # you always get an installable artifact for manual smoke testing.
  # ---------------------------------------------------------------------------
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        # NOTE: pinned to 3.29.x (Dart 3.7). Flutter 3.24.x shipped a
        # Flutter Gradle Plugin that does not register the
        # `android.flutter { ... }` extension used by modern plugins
        # like geolocator_android 4.6.x, causing the Gradle task
        # `assembleDebug` to fail with:
        #   "Could not get unknown property 'flutter' for extension
        #    'android' of type com.android.build.gradle.LibraryExtension."
        # 3.29.x also ships newer AGP + compileSdk 35 defaults that
        # satisfy flutter_plugin_android_lifecycle's requirements.
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.x'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod, freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        # Formatting drift should never block the APK build.
        continue-on-error: true
        run: |
          files=$(find lib test -name '*.dart' \
            -not -name '*.g.dart' \
            -not -name '*.freezed.dart' 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No Dart files to format."
          else
            echo "$files" | xargs dart format --set-exit-if-changed --output=none
          fi

      - name: Analyze code
        continue-on-error: true
        run: flutter analyze --no-fatal-infos

      - name: Run unit + integration tests
        continue-on-error: true
        run: flutter test --reporter expanded

  # ---------------------------------------------------------------------------
  # Build a debug APK. Runs INDEPENDENTLY of analyze-and-test (no `needs:`)
  # so CI hiccups in the test job don't prevent producing an installable APK.
  # The APK is uploaded as a workflow artifact (14-day retention).
  #
  # Debug APK = fast to build, easy to debug, but SLOW AT RUNTIME (JIT,
  # no tree shaking, full debug symbols, assertions enabled). Use this
  # only for development smoke tests. For real testing see the
  # build-release-apk job below.
  # ---------------------------------------------------------------------------
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        # See note in analyze-and-test about the 3.29.x pin.
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.x'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod, freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: langgeng-sea-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build a RELEASE APK — this is the one to test on real devices.
  #
  # Release = AOT compile (no JIT), tree-shaking, R8 minify + shrink, no
  # debug symbols, assertions stripped. Typical 5-10x faster at runtime
  # than debug, 30-50% smaller APK.
  #
  # Signing: uses the release config from app/android/app/build.gradle.kts
  # IF android/key.properties exists, otherwise falls back to debug signing
  # so CI can produce installable APKs without needing repo secrets.
  # The resulting APK is installable for sideload testing but NOT
  # accepted by Play Store (see RELEASE_CHECKLIST.md section 4 for the
  # proper signed-AAB flow).
  # ---------------------------------------------------------------------------
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.x'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod, freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK (split per ABI)
        # --split-per-abi produces 3 smaller APKs (arm64, armv7, x86_64)
        # instead of one fat APK. Each is ~15-25 MB smaller. For most
        # real HP Android dari 2018+ (arm64-v8a), install file
        # "app-arm64-v8a-release.apk".
        run: flutter build apk --release --split-per-abi

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: langgeng-sea-release-apk
          path: app/build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 14
          if-no-files-found: error
