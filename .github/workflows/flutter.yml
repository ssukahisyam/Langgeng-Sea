name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis + unit/integration tests.
  # Reports red X on failure but does NOT gate APK builds — APK production
  # is moved to:
  #   - .github/workflows/build-release-manual.yml (manual dev builds, via
  #     workflow_dispatch, uploads to GitHub Releases as a pre-release).
  #   - .github/workflows/release.yml (tag v*.*.*, uploads to a real
  #     GitHub Release).
  # We intentionally no longer upload APKs as workflow artifacts because
  # artifact storage is quota-bound and we never sideload from artifacts.
  # ---------------------------------------------------------------------------
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        # NOTE: pinned to 3.29.x (Dart 3.7). Flutter 3.24.x shipped a
        # Flutter Gradle Plugin that does not register the
        # `android.flutter { ... }` extension used by modern plugins
        # like geolocator_android 4.6.x, causing the Gradle task
        # `assembleDebug` to fail with:
        #   "Could not get unknown property 'flutter' for extension
        #    'android' of type com.android.build.gradle.LibraryExtension."
        # 3.29.x also ships newer AGP + compileSdk 35 defaults that
        # satisfy flutter_plugin_android_lifecycle's requirements.
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.x'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod, freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        # Formatting drift should never block the pipeline.
        continue-on-error: true
        run: |
          files=$(find lib test -name '*.dart' \
            -not -name '*.g.dart' \
            -not -name '*.freezed.dart' 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No Dart files to format."
          else
            echo "$files" | xargs dart format --set-exit-if-changed --output=none
          fi

      - name: Analyze code
        continue-on-error: true
        run: flutter analyze --no-fatal-infos

      - name: Run unit + integration tests
        continue-on-error: true
        run: flutter test --reporter expanded
