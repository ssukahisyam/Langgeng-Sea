name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod, freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed --output=none --exclude=lib/**/*.g.dart,lib/**/*.freezed.dart .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run unit + integration tests
        # `flutter test` discovers every *_test.dart under test/ including
        # test/integration/trip_lifecycle_test.dart and
        # test/data/database/migration_test.dart. Both run on the host VM
        # against an in-memory SQLite — no emulator required.
        #
        # NOTE: True on-device integration tests live under
        # integration_test/ (currently empty at M9). When those are added
        # they need `flutter test integration_test/` run on a connected
        # Android emulator / device, e.g. via
        # reactivecircus/android-emulator-runner@v2.
        run: flutter test --reporter expanded

  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod, freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: langgeng-sea-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
