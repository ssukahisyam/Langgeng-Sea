name: langgeng_sea
description: "Aplikasi tracking GPS offline untuk nelayan trawl Indonesia."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  fl_chart: ^0.68.0
  flutter_colorpicker: ^1.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.0

  # Location & GPS
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  flutter_compass: ^0.8.0
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7
  flutter_local_notifications: ^17.2.3

  # Device info — used by TrackingPermissionFlow to read Android SDK
  # level (so we can gate ACCESS_BACKGROUND_LOCATION on API 29+ and
  # POST_NOTIFICATIONS on API 33+). See Requirement 1 AC 5, 6, 10.
  device_info_plus: ^10.1.2

  # Navigation (M11) — TTS for "sudah sampai" voice alerts. flutter_tts
  # is a thin wrapper over the platform TTS engine (Android
  # `TextToSpeech`, iOS `AVSpeechSynthesizer`); ~1 MB added to the APK,
  # no extra runtime permissions required, language set to id-ID at
  # service init. See m11-navigation-spec.md §5.
  flutter_tts: ^4.0.2

  # Database
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Models & serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  uuid: ^4.4.2

  # Files & sharing
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  xml: ^6.5.0

  # Wakelock — keep CPU alive during GPS tracking so background isolate
  # is not throttled by Android Doze when the screen is off.
  wakelock_plus: ^1.2.8

  # Persistent device-state preferences (PR #32) — first-time tooltip
  # flag for marker pick discoverability. Used for non-domain UI
  # state that doesn't deserve a Drift schema bump.
  shared_preferences: ^2.3.0

  # Page transitions yang smooth tanpa "area hitam" antara outgoing
  # dan incoming tab — pakai SharedAxisTransition dengan fillColor
  # solid sehingga gap visual saat slide tertutup. Resmi dari Flutter
  # Material team, ringan (~12 kB AAR).
  animations: ^2.0.11

  # Utils
  intl: ">=0.19.0 <1.0.0"
  collection: ^1.18.0
  logger: ^2.4.0

  # Android intents — pakai untuk deep-link ke halaman permission
  # spesifik di Settings sistem (ACTION_APP_NOTIFICATION_SETTINGS,
  # ACTION_IGNORE_BATTERY_OPTIMIZATION_SETTINGS). openAppSettings()
  # dari permission_handler hanya buka halaman App Info umum;
  # android_intent_plus memungkinkan kita lompat langsung ke section
  # yang relevan.
  android_intent_plus: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

  # Code generation
  build_runner: ^2.4.12
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  drift_dev: ^2.20.2
  riverpod_generator: ^2.4.3
  custom_lint: any
  riverpod_lint: any

flutter:
  uses-material-design: true
  # NOTE: `generate: true` is intentionally disabled — we don't ship an
  # l10n.yaml / *.arb bundle yet. Re-enable when M11 (localisation) lands.

  assets:
    - assets/images/
    - assets/icons/
